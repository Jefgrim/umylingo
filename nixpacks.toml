[variables]
NIXPACKS_PHP_VERSION = "8.3"
LOG_CHANNEL = "stack"
LOG_STACK = "single,stderr"
LOG_LEVEL = "debug"
MYSQLDUMP_PATH = "/root/.nix-profile/bin/mysqldump"

[phases.setup]
nixPkgs = [
    "php83",
    "php83Packages.composer",
    "php83Extensions.pdo_mysql",
    "php83Extensions.mysqli",
    "php83Extensions.mbstring",
    "php83Extensions.xml",
    "php83Extensions.curl",
    "php83Extensions.gd",
    "php83Extensions.intl",
    "php83Extensions.zip",
    "php83Extensions.bcmath",
    "php83Extensions.tokenizer",
    "php83Extensions.openssl",
    "mariadb-client",
    "mysql-client",
    "nodejs_20",
    "nodePackages.npm"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci",
    "npm run build"
]

[phases.build]
cmds = [
    "php artisan view:cache"
]

[start]
cmd = "mariadb -h $DB_HOST -u $DB_USERNAME -p$DB_PASSWORD -e \"ALTER USER '$DB_USERNAME'@'%' IDENTIFIED WITH mysql_native_password BY '$DB_PASSWORD'; FLUSH PRIVILEGES;\" || true; php artisan migrate --force; php artisan config:cache; php artisan route:cache; php artisan serve --host=0.0.0.0 --port=$PORT"
