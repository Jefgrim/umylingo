[phases.setup]
nixPkgs = [
    "php84",
    "php84Packages.composer",
    "php84Extensions.pdo",
    "php84Extensions.pdo_mysql",
    "php84Extensions.mysqlnd",
    "php84Extensions.mbstring",
    "php84Extensions.xml",
    "php84Extensions.tokenizer",
    "php84Extensions.bcmath",
    "php84Extensions.curl",
    "php84Extensions.ctype",
    "php84Extensions.fileinfo",
    "php84Extensions.openssl",
    "php84Extensions.session",
    "php84Extensions.intl",
    "php84Extensions.gd",
    "php84Extensions.zip",
    "php84Extensions.zlib",
    "nodejs_20",
    "nodePackages.npm"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci",
    "npm run build"
]

[phases.build]
cmds = [
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force; php artisan config:cache; php artisan route:cache; php artisan serve --host=0.0.0.0 --port=$PORT"
